# Versions here must match requirements-dev.txt exactly — that file is the
# single source of truth. Bump both together, never one alone.
repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: [--line-length=88]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=88]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=mypy.ini]
        additional_dependencies: [types-requests==2.32.0.20240622]
        exclude: (^|/)tests/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-x, "**/tests/**,**/.*"]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        pass_filenames: false
        args: [".", "--exclude=**/tests/**,**/.venv/**,**/.git/**"]

  # pylint needs the project's own runtime deps importable to resolve
  # third-party imports correctly, so it stays a local/system hook rather
  # than a sandboxed mirror repo. Pin its version via requirements-dev.txt
  # and install that before running `pre-commit run` locally.
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args: ["--init-hook=import sys, os; sys.path.insert(0, os.path.abspath('.venv/Lib/site-packages'))"]
        exclude: (^|/)tests/