name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    name: Quality Gate (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14']
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install pinned dev/QA tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install script dependencies
        run: |
          find . -name "requirements.txt" -not -path '*/.*' -exec pip install -r {} \;

      # Every check below runs independently (continue-on-error) so a single
      # failing tool never hides the others. The summary step at the end
      # reports everything in one place and fails the job if anything broke.

      - name: Black check
        id: black
        continue-on-error: true
        run: black --check .

      - name: Isort check
        id: isort
        continue-on-error: true
        run: isort --check-only .

      - name: Flake8 check
        id: flake8
        continue-on-error: true
        run: |
          echo "::add-matcher::.github/problem-matchers/flake8.json"
          flake8 --max-line-length=88 --exclude=web/node_modules,web/.next .
          echo "::remove-matcher owner=flake8::"

      - name: Pylint check
        id: pylint
        continue-on-error: true
        run: |
          echo "::add-matcher::.github/problem-matchers/pylint.json"
          find . -name "*.py" -not -path '*/tests/*' -not -path '*/.*' \
            -not -path '*/node_modules/*' -not -path '*/.next/*' -exec pylint {} +
          echo "::remove-matcher owner=pylint::"

      - name: Mypy check
        id: mypy
        continue-on-error: true
        run: |
          # One mypy invocation per script directory, not one big batch across
          # the whole repo. Two different script folders can (and will, at
          # this repo's scale) share a filename like vulture_whitelist.py or
          # main.py with no package structure to disambiguate them — batching
          # them into a single mypy call makes it try to assign both the same
          # module name and fail with "Duplicate module named X". Looping per
          # directory makes that collision structurally impossible: files in
          # the same folder are safe to check together, different folders
          # never share an invocation.
          echo "::add-matcher::.github/problem-matchers/mypy.json"
          failures=0
          dirs=$(find . -name "*.py" -not -path '*/tests/*' -not -path '*/.*' \
            -not -path '*/node_modules/*' -not -path '*/.next/*' \
            -exec dirname {} \; | sort -u)
          for dir in $dirs; do
            echo "::group::mypy: $dir"
            mypy --config-file=mypy.ini "$dir"/*.py
            status=$?
            echo "::endgroup::"
            if [ $status -ne 0 ]; then
              failures=$((failures + 1))
            fi
          done
          echo "::remove-matcher owner=mypy::"
          if [ "$failures" -gt 0 ]; then
            echo "$failures director(y/ies) failed mypy."
            exit 1
          fi

      - name: Bandit check
        id: bandit
        continue-on-error: true
        run: bandit -r . -x '**/tests/**,**/.*,**/node_modules/**,**/.next/**'

      - name: Vulture check
        id: vulture
        continue-on-error: true
        run: |
          find . -name "*.py" -not -path '*/tests/*' -not -path '*/.*' \
            -not -path '*/node_modules/*' -not -path '*/.next/*' -exec vulture {} +

      - name: Pip-audit check
        id: pip_audit
        continue-on-error: true
        run: find . -name "requirements.txt" -not -path '*/.*' -exec pip-audit -r {} \;

      - name: Pytest + per-script coverage gate
        id: pytest
        continue-on-error: true
        run: |
          # A single repo-wide coverage average would let a weak script hide
          # behind strong ones. Gate each script folder with a tests/ dir
          # individually at 80%, running and reporting every folder rather
          # than stopping at the first failure. Each script's run is wrapped
          # in a collapsible ::group:: so the raw log stays navigable once
          # this repo has hundreds of script folders, not just 16.
          failures=0
          failed_dirs=""
          echo "## Pytest + Coverage by script" >> "$GITHUB_STEP_SUMMARY"
          echo "| Script | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for test_dir in $(find . -type d -name tests -not -path '*/.*'); do
            script_dir=$(dirname "$test_dir")
            echo "::group::$script_dir"
            python -m pytest "$test_dir" \
              --import-mode=importlib \
              --cov="$script_dir" \
              --cov-report=term-missing \
              --cov-fail-under=80
            status=$?
            echo "::endgroup::"
            if [ $status -ne 0 ]; then
              echo "| $script_dir | ❌ fail |" >> "$GITHUB_STEP_SUMMARY"
              failed_dirs="$failed_dirs $script_dir"
              failures=$((failures + 1))
            else
              echo "| $script_dir | ✅ pass |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "$failures script(s) failed tests or the coverage threshold:$failed_dirs"
            exit 1
          fi

      - name: Summarize results
        if: always()
        run: |
          results="black:${{ steps.black.outcome }} isort:${{ steps.isort.outcome }} flake8:${{ steps.flake8.outcome }} pylint:${{ steps.pylint.outcome }} mypy:${{ steps.mypy.outcome }} bandit:${{ steps.bandit.outcome }} vulture:${{ steps.vulture.outcome }} pip_audit:${{ steps.pip_audit.outcome }} pytest:${{ steps.pytest.outcome }}"
          failed=0
          echo "## Quality Gate Summary (${{ matrix.os }}, py${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          for pair in $results; do
            name="${pair%%:*}"
            status="${pair##*:}"
            if [ "$status" = "success" ]; then
              echo "| $name | ✅ pass |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $name | ❌ fail |" >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more checks failed — see individual step logs above for exact files/lines."
            exit 1
          fi