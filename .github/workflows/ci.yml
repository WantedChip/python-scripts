name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    name: Quality Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows/macOS legs matter here because a few scripts (device-monitor's
        # ARP parsing, port-inspector's psutil calls, path handling in general)
        # explicitly claim cross-platform behavior. Drop macos-latest if Actions
        # minutes become a real cost concern — it's the priciest runner.
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pinned dev/QA tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install script dependencies
        run: |
          # Every script's own requirements.txt, wherever it lives.
          find . -name "requirements.txt" -not -path '*/.*' -exec pip install -r {} \;

      - name: Format checks
        run: |
          black --check .
          isort --check-only .

      - name: Flake8 check
        run: |
          flake8 --max-line-length=88 .

      - name: Pylint checks
        run: |
          find . -name "*.py" -not -path '*/tests/*' -not -path '*/.*' -exec pylint {} +

      - name: Mypy checks
        run: |
          # explicit_package_bases/namespace_packages in mypy.ini keep
          # same-named files in different script folders (e.g. two
          # main.py) from colliding as "duplicate module" when passed
          # to one invocation.
          find . -name "*.py" -not -path '*/tests/*' -not -path '*/.*' \
            -exec mypy --config-file=mypy.ini {} +

      - name: Bandit checks
        run: |
          bandit -r . -x '**/tests/**,**/.*'

      - name: Vulture check
        run: |
          find . -name "*.py" -not -path '*/tests/*' -not -path '*/.*' -exec vulture {} +

      - name: Pip-audit check
        run: |
          find . -name "requirements.txt" -not -path '*/.*' -exec pip-audit -r {} \;

      - name: Pytest + per-script coverage gate
        run: |
          # A single repo-wide coverage average would let a weak script hide
          # behind strong ones. Instead, gate each script folder that has a
          # tests/ dir individually at 80%, and fail the job if any one
          # script misses — while still running and reporting every folder,
          # not stopping at the first failure.
          set +e
          failures=0
          for test_dir in $(find . -type d -name tests -not -path '*/.*'); do
            script_dir=$(dirname "$test_dir")
            echo "== $script_dir =="
            python -m pytest "$test_dir" \
              --import-mode=importlib \
              --cov="$script_dir" \
              --cov-report=term-missing \
              --cov-fail-under=80
            if [ $? -ne 0 ]; then
              echo "FAILED (tests or <80% coverage): $script_dir"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "$failures script(s) failed tests or the coverage threshold."
            exit 1
          fi