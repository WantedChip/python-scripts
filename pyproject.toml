[tool.isort]
profile = "black"
line_length = 88
skip_glob = ["web/node_modules/*", "web/.next/*"]

[tool.black]
line-length = 88
extend-exclude = '''
(
  web/node_modules
  | web/\.next
)
'''

[tool.coverage.run]
# Python 3.14+ defaults to a different measurement engine (sysmon, based on
# sys.monitoring) than 3.12/3.13 (ctrace). Forcing ctrace everywhere keeps
# coverage measurement identical across every Python version in the CI
# matrix, so a coverage discrepancy always points to a real test/code issue
# rather than "which engine happened to run."
core = "ctrace"